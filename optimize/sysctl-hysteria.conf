# Kernel parameters for Hysteria2 (QUIC/UDP) optimization
# Install: sudo cp sysctl-hysteria.conf /etc/sysctl.d/99-hysteria.conf && sudo sysctl -p /etc/sysctl.d/99-hysteria.conf

# UDP buffer sizes - 16MB (default 208KB is far too small for QUIC)
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.core.rmem_default=16777216
net.core.wmem_default=16777216

# Increase network queue depth
net.core.netdev_max_backlog=10000

# UDP memory limits
net.ipv4.udp_mem=65536 131072 262144

# BBR congestion control + fq scheduler (best combo for BBR)
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr
